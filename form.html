<body>
    
    <form>
       
        <p><h2>Student Registration Form</h2></p>
        <p>Student Name</p>
        <input type="text" placeholder="First Name">
        <input type="text" placeholder="Middle Name">
        <input type="text" placeholder="Last Name">
        <br><br>
        <p>Student Number</p>
        <input type="text" placeholder="e.g. 123456789">
        <br><br>
        <p>Select Your Gender:
        <label for="Male">
            <input type="radio" value="Male" name="Gender" id="Male" > Male
        </label>
         <label for="Female">
            <input type="radio" value="Female" name="Gender" id="Female" > Female
        </label>
         <label for="Trans">
            <input type="radio" value="Trans" name="Gender" id="Trans" > Trans
        </label></p>
        <br>
        <p>Degree Program
        <select name="Degree" id="Dgree">
            <option value="ITI">ITI</option>
            <option value="Diploma">Diploma</option>
            <option value="B.Tech.">B.Tech.</option>
            <option value="M.Tech.">M.Tech.</option>
            <option value="MCA">MCA</option>
        </select></p>
        <br>
        <p>Year Level

            <option value="1st Year">1st Year</option>

            <option value="3rd Year">3rd Year</option>
            <option value="4th Year">4th Year</option>
        </select></p>
        <br>

        <br><br>

            <option value="Sun Cellular">Sun Cellular</option>
            <option value="Touch Mobile">Touch Mobile</option>
        </select></p>
        <br><br>
        <p>Enter Date of Birth:

                <option value="16">16</option>

                <option value="22">22</option>
                <option value="23">23</option>
                <option value="24">24</option>
                <option value="25">25</option>
                <option value="26">26</option>
                <option value="27">27</option>
                <option value="28">28</option>
                <option value="29">29</option>
                <option value="30">30</option>
            </select>
            <select name="Month" id="Month">
                <option>Month</option>
                <option value="January">January</option>
                <option value="February">February</option>
                <option value="March">March</option>
                <option value="April">April</option>
                <option value="May">May</option>
                <option value="June">June</option>
                <option value="July">July</option>

        <h3>Permanent Adress:</h3>
         <p>Village:
        <input type="text" placeholder="Village"> 
         Post Office:
        <input type="text" placeholder="P.O."></p>
        <p>District:
        <input type="text" placeholder="Dist">
        State:
        <input type="text" placeholder="state"></p>
        <p>PIN:
        <input type="text" placeholder="PIN">
        Country:
        <input type="text" placeholder="Country">

        <label for="id2">
            <input type="checkbox" value="Other" name="class" id="id2">Other
        </label>

        <label for id="id1" >

        </label><br>
        <label for id="id2" >

        <label for id="id3" >

        </label><br>
        <label for id="id4" >

        </label><br><br>
